<!doctype html>
<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <title>HZ | Bookshelf App</title>
    <script defer src="main.js"></script>
  </head>
  <body class="row">
    <header class="col-md-8 offset-md-2 text-center">
      <h1>Bookshelf App</h1>
    </header>
    <main class="col-md-8 offset-md-2">
      <!-- Kolom Tambah Buku -->
      <section class="p-2 m-2 border rounded">
        <h2>Tambah Buku Baru</h2>
        <form id="bookForm" data-testid="bookForm">
          <div>
            <label for="bookFormTitle" class="form-label">Judul</label>
            <input
              name="title"
              id="bookFormTitle"
              type="text"
              required
              data-testid="bookFormTitleInput"
              class="form-control"
            />
          </div>
          <div>
            <label for="bookFormAuthor" class="form-label">Penulis</label>
            <input
              name="author"
              id="bookFormAuthor"
              type="text"
              required
              data-testid="bookFormAuthorInput"
              class="form-control"
            />
          </div>
          <div>
            <label for="bookFormYear" class="form-label">Tahun</label>
            <input
              name="year"
              id="bookFormYear"
              type="number"
              required
              data-testid="bookFormYearInput"
              class="form-control"
            />
          </div>
          <div class="form-check">
            <label for="bookFormIsComplete" class="form-check-label"
              >Selesai dibaca</label
            >
            <input
              name="is_complete"
              id="bookFormIsComplete"
              type="checkbox"
              data-testid="bookFormIsCompleteCheckbox"
              class="form-check-input"
            />
          </div>
          <button
            id="bookFormSubmit"
            type="submit"
            data-testid="bookFormSubmitButton"
            class="btn btn-success"
          >
            Masukkan Buku ke Rak:
            <span id="isCompleteStatus" class="text-warning"
              >Belum Selesai Dibaca</span
            >
          </button>
        </form>
      </section>
      <!-- Kolom Pencarian Buku -->
      <section class="p-2 m-2 border rounded">
        <h2>Cari Buku</h2>
        <form id="searchBook" data-testid="searchBookForm">
          <label for="searchBookTitle" class="form-label">Judul</label>
          <div class="input-group">
            <input
              id="searchBookTitle"
              type="text"
              data-testid="searchBookFormTitleInput"
              class="form-control"
            />
            <button
              id="searchSubmit"
              type="submit"
              data-testid="searchBookFormSubmitButton"
              class="btn btn-primary px-4 fw-bold"
            >
              Cari
            </button>
          </div>
        </form>
        <div id="searchBookResultList"></div>
      </section>
      <!-- Kolom Buku Belum Selesai Dibaca -->
      <section class="p-2 m-2 border rounded">
        <h2>Belum selesai dibaca</h2>
        <div id="incompleteBookList" data-testid="incompleteBookList"></div>
      </section>
      <!-- Kolom Buku Selesai Dibaca -->
      <section class="p-2 m-2 border rounded">
        <h2>Selesai dibaca</h2>
        <div id="completeBookList" data-testid="completeBookList"></div>
      </section>
      <!-- Template Data Buku -->
      <template id="bookCardTemplate">
        <div
          data-bookid="{{ ID_buku }}"
          data-testid="bookItem"
          class="book-article p-2 my-2 border rounded"
        >
          <h3 data-testid="bookItemTitle" class="book-title">
            {{ judul_buku }}
          </h3>
          <p data-testid="bookItemAuthor" class="book-author">
            Penulis: {{ penulis_buku }}
          </p>
          <p data-testid="bookItemYear" class="book-year">
            Tahun: {{ tahun_rilis_buku }}
          </p>
          <div>
            <button
              data-testid="bookItemIsCompleteButton"
              class="book-status btn btn-info"
            >
              {{ tombol_untuk_ubah_kondisi }}
            </button>
            <button
              data-testid="bookItemDeleteButton"
              class="book-delete btn btn-danger"
            >
              Delete
            </button>
            <button
              data-testid="bookItemEditButton"
              class="book-update btn btn-warning"
            >
              Edit
            </button>
          </div>
        </div>
      </template>
    </main>
  </body>
</html>
