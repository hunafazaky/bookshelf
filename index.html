<!doctype html>
<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="./assets/icons/hz-icon.svg" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <title>Hunafa Zaky | Bookshelf App</title>
    <script defer src="main.js"></script>
  </head>
  <body class="container">
    <header class="row">
      <h1 class="col-md-8 offset-md-2 text-center p-2 my-2">Bookshelf App</h1>
    </header>
    <main class="row">
      <div class="col-md-8 offset-md-2">
        <!-- Kolom Tambah Buku -->
        <section class="bg-success text-light p-4 my-2 rounded">
          <h2>Tambah Buku Baru</h2>
          <form id="bookForm" data-testid="bookForm">
            <div>
              <label for="bookFormTitle" class="form-label">Judul</label>
              <input
                name="title"
                id="bookFormTitle"
                type="text"
                required
                data-testid="bookFormTitleInput"
                class="form-control"
              />
            </div>
            <div>
              <label for="bookFormAuthor" class="form-label">Penulis</label>
              <input
                name="author"
                id="bookFormAuthor"
                type="text"
                required
                data-testid="bookFormAuthorInput"
                class="form-control"
              />
            </div>
            <div>
              <label for="bookFormYear" class="form-label">Tahun</label>
              <input
                name="year"
                id="bookFormYear"
                type="number"
                required
                data-testid="bookFormYearInput"
                class="form-control"
              />
            </div>
            <div class="form-check">
              <label for="bookFormIsComplete" class="form-check-label"
                >Selesai dibaca</label
              >
              <input
                name="isComplete"
                id="bookFormIsComplete"
                type="checkbox"
                data-testid="bookFormIsCompleteCheckbox"
                class="form-check-input"
              />
            </div>
            <button
              id="bookFormSubmit"
              type="submit"
              data-testid="bookFormSubmitButton"
              class="btn btn-warning mt-4"
            >
              <div class="d-flex align-items-center">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="16"
                  height="16"
                  fill="currentColor"
                  class="bi bi-plus-square me-1"
                  viewBox="0 0 16 16"
                >
                  <path
                    d="M14 1a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1zM2 0a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2z"
                  />
                  <path
                    d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4"
                  />
                </svg>
                Masukkan Buku ke Rak:&nbsp;
                <span id="isCompleteStatus" class="text-success fw-bold"
                  >Belum Selesai Dibaca</span
                >
              </div>
            </button>
          </form>
        </section>
        <!-- Kolom Pencarian Buku -->
        <section class="bg-warning text-dark p-4 my-2 rounded">
          <h2>Cari Buku</h2>
          <form id="searchBook" data-testid="searchBookForm">
            <label for="searchBookTitle" class="form-label">Judul</label>
            <div class="input-group">
              <input
                id="searchBookTitle"
                type="search"
                data-testid="searchBookFormTitleInput"
                class="form-control"
              />
              <button
                id="searchSubmit"
                type="submit"
                data-testid="searchBookFormSubmitButton"
                class="btn btn-dark px-5 fw-bold"
              >
                <div class="d-flex align-items-center">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="16"
                    height="16"
                    fill="currentColor"
                    class="bi bi-search me-1"
                    viewBox="0 0 16 16"
                  >
                    <path
                      d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"
                    />
                  </svg>
                  Cari
                </div>
              </button>
            </div>
          </form>
          <div id="searchBookResultList"></div>
        </section>
        <!-- Kolom Buku Belum Selesai Dibaca -->
        <section
          class="bg-light text-dark p-4 my-2 border border-4 border-secondary rounded"
        >
          <h2>Belum selesai dibaca</h2>
          <div id="incompleteBookList" data-testid="incompleteBookList"></div>
        </section>
        <!-- Kolom Buku Selesai Dibaca -->
        <section
          class="bg-light text-dark p-4 my-2 border border-4 border-info rounded"
        >
          <h2>Selesai dibaca</h2>
          <div id="completeBookList" data-testid="completeBookList"></div>
        </section>
      </div>
    </main>
    <!-- Template Data Buku -->
    <template id="bookCardTemplate">
      <div
        data-bookid="{{ ID_buku }}"
        data-testid="bookItem"
        class="book-article bg-light text-dark p-4 my-2 border border-dark rounded"
      >
        <h3 data-testid="bookItemTitle" class="book-title mb-2">
          {{ judul_buku }}
        </h3>
        <p data-testid="bookItemAuthor" class="mb-1">
          <span class="fw-bold"> Penulis: </span>
          <span class="book-author"> {{ penulis_buku }} </span>
        </p>
        <p data-testid="bookItemYear" class="mb-1">
          <span class="fw-bold"> Tahun: </span>
          <span class="book-year"> {{ tahun_rilis_buku }} </span>
        </p>
        <div>
          <button
            data-testid="bookItemIsCompleteButton"
            class="book-status btn"
          >
            <div class="d-flex align-items-center">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                fill="currentColor"
                class="bi bi-check-square me-1"
                viewBox="0 0 16 16"
              >
                <path
                  d="M14 1a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1zM2 0a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2z"
                />
                <path
                  d="M10.97 4.97a.75.75 0 0 1 1.071 1.05l-3.992 4.99a.75.75 0 0 1-1.08.02L4.324 8.384a.75.75 0 1 1 1.06-1.06l2.094 2.093 3.473-4.425z"
                />
              </svg>
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                fill="currentColor"
                class="bi bi-check-square-fill me-1"
                viewBox="0 0 16 16"
              >
                <path
                  d="M2 0a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2zm10.03 4.97a.75.75 0 0 1 .011 1.05l-3.992 4.99a.75.75 0 0 1-1.08.02L4.324 8.384a.75.75 0 1 1 1.06-1.06l2.094 2.093 3.473-4.425a.75.75 0 0 1 1.08-.022z"
                />
              </svg>
              <span class="book-status-text">Selesai Dibaca</span>
            </div>
          </button>
          <button
            data-testid="bookItemDeleteButton"
            class="book-delete btn btn-danger"
          >
            <div class="d-flex align-items-center">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                fill="currentColor"
                class="bi bi-x-square me-1"
                viewBox="0 0 16 16"
              >
                <path
                  d="M14 1a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1zM2 0a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2z"
                />
                <path
                  d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708"
                />
              </svg>
              Delete
            </div>
          </button>
          <button
            data-testid="bookItemEditButton"
            class="book-update btn btn-warning"
            data-bs-toggle="modal"
            data-bs-target="#staticBackdrop"
          >
            <div class="d-flex align-items-center">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                fill="currentColor"
                class="bi bi-pencil-square me-1"
                viewBox="0 0 16 16"
              >
                <path
                  d="M15.502 1.94a.5.5 0 0 1 0 .706L14.459 3.69l-2-2L13.502.646a.5.5 0 0 1 .707 0l1.293 1.293zm-1.75 2.456-2-2L4.939 9.21a.5.5 0 0 0-.121.196l-.805 2.414a.25.25 0 0 0 .316.316l2.414-.805a.5.5 0 0 0 .196-.12l6.813-6.814z"
                />
                <path
                  fill-rule="evenodd"
                  d="M1 13.5A1.5 1.5 0 0 0 2.5 15h11a1.5 1.5 0 0 0 1.5-1.5v-6a.5.5 0 0 0-1 0v6a.5.5 0 0 1-.5.5h-11a.5.5 0 0 1-.5-.5v-11a.5.5 0 0 1 .5-.5H9a.5.5 0 0 0 0-1H2.5A1.5 1.5 0 0 0 1 2.5z"
                />
              </svg>
              Edit
            </div>
          </button>
        </div>
      </div>
    </template>
    <!-- Modal Dialog -->
    <div
      class="modal fade"
      id="staticBackdrop"
      data-bs-backdrop="static"
      data-bs-keyboard="false"
      tabindex="-1"
      aria-labelledby="staticBackdropLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title fs-5" id="staticBackdropLabel">Edit Buku</h1>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <form id="editBookForm">
            <div class="modal-body">
              <div>
                <label for="editBookFormTitle" class="form-label">Judul</label>
                <input
                  name="title"
                  id="editBookFormTitle"
                  type="text"
                  required
                  class="form-control"
                />
              </div>
              <div>
                <label for="editBookFormAuthor" class="form-label"
                  >Penulis</label
                >
                <input
                  name="author"
                  id="editBookFormAuthor"
                  type="text"
                  required
                  class="form-control"
                />
              </div>
              <div>
                <label for="editBookFormYear" class="form-label">Tahun</label>
                <input
                  name="year"
                  id="editBookFormYear"
                  type="number"
                  required
                  class="form-control"
                />
              </div>
              <div class="form-check">
                <label for="editBookFormIsComplete" class="form-check-label"
                  >Selesai dibaca</label
                >
                <input
                  name="isComplete"
                  id="editBookFormIsComplete"
                  type="checkbox"
                  class="form-check-input"
                />
              </div>
            </div>
            <div class="modal-footer">
              <button
                type="button"
                class="btn btn-secondary"
                data-bs-dismiss="modal"
              >
                Keluar
              </button>
              <button
                id="editBookFormSubmit"
                type="submit"
                class="btn btn-warning"
              >
                Simpan Perubahan
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
