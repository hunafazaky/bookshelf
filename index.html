<!doctype html>
<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Bootstrap CSS -->
    <title>Bookshelf App</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <!-- Impor script kamu di sini -->
    <!-- Lampirkan `defer` jika pemanggilan dilakukan dalam <head> -->
    <script defer src="main.js"></script>
  </head>
  <body data-bs-theme="dark">
    <header class="m-4">
      <h1 class="text-center fw-bold">Bookshelf App</h1>
    </header>
    <main>
      <section class="m-2 p-2 border rounded">
        <h2>Tambah Buku Baru</h2>
        <form id="bookForm" data-testid="bookForm">
          <div class="mb-2">
            <label class="form-label" for="bookFormTitle">Judul</label>
            <input
              class="form-control form-control-sm"
              id="bookFormTitle"
              name="title"
              type="text"
              required
              data-testid="bookFormTitleInput"
            />
          </div>
          <div class="mb-2">
            <label class="form-label" for="bookFormAuthor">Penulis</label>
            <input
              class="form-control form-control-sm"
              id="bookFormAuthor"
              name="author"
              type="text"
              required
              data-testid="bookFormAuthorInput"
            />
          </div>
          <div class="mb-2">
            <label class="form-label" for="bookFormYear">Tahun</label>
            <input
              class="form-control form-control-sm"
              id="bookFormYear"
              name="year"
              type="number"
              required
              data-testid="bookFormYearInput"
            />
          </div>
          <div class="mb-2 form-check">
            <label class="form-check-label" for="bookFormIsComplete"
              >Selesai dibaca</label
            >
            <input
              class="form-check-input"
              id="bookFormIsComplete"
              name="isComplete"
              type="checkbox"
              data-testid="bookFormIsCompleteCheckbox"
            />
          </div>
          <div class="d-flex justify-content-end">
            <button
              class="btn btn-sm btn-success"
              id="bookFormSubmit"
              type="submit"
              data-testid="bookFormSubmitButton"
            >
              Masukkan Buku ke rak:
              <span id="isCompleteStatus" class="text-warning"
                >Belum selesai dibaca</span
              >
            </button>
          </div>
        </form>
      </section>

      <section class="m-2 p-2 border rounded">
        <h2>Cari Buku</h2>
        <form id="searchBook" data-testid="searchBookForm">
          <label class="form-label" for="searchBookTitle">Judul</label>
          <div class="input-group">
            <input
              class="form-control form-control-sm"
              id="searchBookTitle"
              type="text"
              data-testid="searchBookFormTitleInput"
              aria-describedby="searchSubmit"
            />
            <button
              class="btn btn-sm btn-success form-control-sm fw-bold px-4"
              id="searchSubmit"
              type="submit"
              data-testid="searchBookFormSubmitButton"
            >
              Cari
            </button>
          </div>
        </form>
        <div id="filteredBookList">
          <template id="filteredBookTemp">
            <div
              class="book-article my-2 p-2 border rounded"
              data-bookid="789789789"
              data-testid="bookItem"
            >
              <h3 data-testid="bookItemTitle" class="title fw-bold">
                Judul Buku 1
              </h3>
              <div class="mb-2">
                <p data-testid="bookItemAuthor" class="author">
                  Penulis: Penulis Buku 1
                </p>
                <p data-testid="bookItemYear" class="year">Tahun: 2030</p>
              </div>
              <div class="btn-group" role="group" aria-label="Basic example">
                <button
                  class="btn btn-sm btn-primary"
                  data-testid="bookItemIsCompleteButton"
                >
                  Selesai dibaca
                </button>
                <button
                  class="delete btn btn-sm btn-outline-danger"
                  data-testid="bookItemDeleteButton"
                >
                  Hapus Buku
                </button>
                <button
                  class="btn btn-sm btn-outline-warning"
                  data-testid="bookItemEditButton"
                >
                  Edit Buku
                </button>
              </div>
            </div>
          </template>
        </div>
      </section>

      <section class="m-2 p-2 border rounded">
        <h2>Belum selesai dibaca</h2>
        <div id="incompleteBookList" data-testid="incompleteBookList">
          <template id="incompleteBookTemp">
            <div
              class="book-article my-2 p-2 border rounded"
              data-bookid="123123123"
              data-testid="bookItem"
            >
              <h3 data-testid="bookItemTitle" class="title fw-bold">
                Judul Buku 1
              </h3>
              <div class="mb-2">
                <p data-testid="bookItemAuthor" class="author">
                  Penulis: Penulis Buku 1
                </p>
                <p data-testid="bookItemYear" class="year">Tahun: 2030</p>
              </div>
              <div class="btn-group" role="group" aria-label="Basic example">
                <button
                  class="btn btn-sm btn-outline-primary"
                  data-testid="bookItemIsCompleteButton"
                >
                  Selesai dibaca
                </button>
                <button
                  class="delete btn btn-sm btn-outline-danger"
                  data-testid="bookItemDeleteButton"
                >
                  Hapus Buku
                </button>
                <button
                  class="btn btn-sm btn-outline-warning"
                  data-testid="bookItemEditButton"
                >
                  Edit Buku
                </button>
              </div>
            </div>
          </template>
        </div>
      </section>

      <section class="m-2 p-2 border rounded">
        <h2>Selesai dibaca</h2>

        <div id="completeBookList" data-testid="completeBookList">
          <template id="completeBookTemp">
            <div
              class="book-article my-2 p-2 border rounded"
              data-bookid="456456456"
              data-testid="bookItem"
            >
              <h3 data-testid="bookItemTitle" class="title fw-bold">
                Judul Buku 1
              </h3>
              <div class="mb-2">
                <p data-testid="bookItemAuthor" class="author">
                  Penulis: Penulis Buku 1
                </p>
                <p data-testid="bookItemYear" class="year">Tahun: 2030</p>
              </div>
              <div class="btn-group" role="group" aria-label="Basic example">
                <button
                  class="btn btn-sm btn-primary"
                  data-testid="bookItemIsCompleteButton"
                >
                  Selesai dibaca
                </button>
                <button
                  class="delete btn btn-sm btn-outline-danger"
                  data-testid="bookItemDeleteButton"
                >
                  Hapus Buku
                </button>
                <button
                  class="btn btn-sm btn-outline-warning"
                  data-testid="bookItemEditButton"
                >
                  Edit Buku
                </button>
              </div>
            </div>
          </template>
        </div>
      </section>
    </main>
  </body>
</html>
