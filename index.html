<!doctype html>
<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Bootstrap CSS -->
    <title>Bookshelf App</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <!-- Impor script kamu di sini -->
    <!-- Lampirkan `defer` jika pemanggilan dilakukan dalam <head> -->
    <script defer src="main.js"></script>
  </head>
  <body class="m-2">
    <header>
      <h1>Bookshelf App</h1>
    </header>
    <main>
      <section class="mb-4 p-2 border rounded">
        <h2>Tambah Buku Baru</h2>
        <form id="bookForm" data-testid="bookForm">
          <div>
            <label class="form-label" for="bookFormTitle">Judul</label>
            <input
              class="form-control"
              id="bookFormTitle"
              name="title"
              type="text"
              required
              data-testid="bookFormTitleInput"
            />
          </div>
          <div>
            <label class="form-label" for="bookFormAuthor">Penulis</label>
            <input
              class="form-control"
              id="bookFormAuthor"
              name="author"
              type="text"
              required
              data-testid="bookFormAuthorInput"
            />
          </div>
          <div>
            <label class="form-label" for="bookFormYear">Tahun</label>
            <input
              class="form-control"
              id="bookFormYear"
              name="year"
              type="number"
              required
              data-testid="bookFormYearInput"
            />
          </div>
          <div class="form-check">
            <label class="form-check-label" for="bookFormIsComplete"
              >Selesai dibaca</label
            >
            <input
              class="form-check-input"
              id="bookFormIsComplete"
              name="isComplete"
              type="checkbox"
              data-testid="bookFormIsCompleteCheckbox"
            />
          </div>
          <button
            class="btn btn-success"
            id="bookFormSubmit"
            type="submit"
            data-testid="bookFormSubmitButton"
          >
            Masukkan Buku ke rak <span>Belum selesai dibaca</span>
          </button>
        </form>
      </section>

      <section class="mb-4 p-2 border rounded">
        <h2>Cari Buku</h2>
        <form id="searchBook" data-testid="searchBookForm">
          <label class="form-label" for="searchBookTitle">Judul</label>
          <div class="row">
            <div class="col-sm-9">
              <input
                class="form-control"
                id="searchBookTitle"
                type="text"
                data-testid="searchBookFormTitleInput"
              />
            </div>
            <div class="col-sm">
              <button
                class="btn btn-success form-control"
                id="searchSubmit"
                type="submit"
                data-testid="searchBookFormSubmitButton"
              >
                Cari
              </button>
            </div>
          </div>
        </form>
      </section>

      <section class="mb-4 p-2 border rounded">
        <h2>Belum selesai dibaca</h2>

        <div id="incompleteBookList" data-testid="incompleteBookList">
          <!-- 
            Ini adalah struktur HTML untuk masing-masing buku.
            Pastikan susunan elemen beserta atribut data-testid menyesuaikan seperti contoh ini.
          -->
          <template
            id="incompleteBookTemp"
            data-bookid="123123123"
            data-testid="bookItem"
          >
            <h3 data-testid="bookItemTitle" class="title">Judul Buku 1</h3>
            <p data-testid="bookItemAuthor" class="author">
              Penulis: Penulis Buku 1
            </p>
            <p data-testid="bookItemYear" class="year">Tahun: 2030</p>
            <div>
              <button
                class="btn btn-primary"
                data-testid="bookItemIsCompleteButton"
              >
                Selesai dibaca
              </button>
              <button
                class="btn btn-primary"
                data-testid="bookItemDeleteButton"
              >
                Hapus Buku
              </button>
              <button class="btn btn-primary" data-testid="bookItemEditButton">
                Edit Buku
              </button>
            </div>
          </template>
        </div>
      </section>

      <section class="mb-4 p-2 border rounded">
        <h2>Selesai dibaca</h2>

        <div id="completeBookList" data-testid="completeBookList">
          <!-- 
            Ini adalah struktur HTML untuk masing-masing buku.
            Pastikan susunan elemen beserta atribut data-testid menyesuaikan seperti contoh ini.
          -->
          <template
            id="completeBookTemp"
            data-bookid="456456456"
            data-testid="bookItem"
          >
            <h3 data-testid="bookItemTitle" class="title">Judul Buku 2</h3>
            <p data-testid="bookItemAuthor" class="author">
              Penulis: Penulis Buku 2
            </p>
            <p data-testid="bookItemYear" class="year">Tahun: 2030</p>
            <div>
              <button
                class="btn btn-primary"
                data-testid="bookItemIsCompleteButton"
              >
                Selesai dibaca
              </button>
              <button
                class="btn btn-primary"
                data-testid="bookItemDeleteButton"
              >
                Hapus Buku
              </button>
              <button class="btn btn-primary" data-testid="bookItemEditButton">
                Edit Buku
              </button>
            </div>
          </template>
        </div>
      </section>

      <section>
        <div data-bookid="{{ ID_buku }}" data-testid="bookItem">
          <h3 data-testid="bookItemTitle">{{ judul_buku }}</h3>
          <p data-testid="bookItemAuthor">Penulis: {{ penulis_buku }}</p>
          <p data-testid="bookItemYear">Tahun: {{ tahun_rilis_buku }}</p>
          <div>
            <button data-testid="bookItemIsCompleteButton">
              {{ tombol_untuk_ubah_kondisi }}
            </button>
            <button data-testid="bookItemDeleteButton">
              {{ tombol_untuk_hapus }}
            </button>
            <button data-testid="bookItemEditButton">
              {{ tombol_untuk_edit }}
            </button>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
